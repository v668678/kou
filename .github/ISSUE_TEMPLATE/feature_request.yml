name: Feature request
description: Suggest a workflow, mapping, or validation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Operational problem
      description: Describe the inventory or trade workflow problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the desired input and output with synthetic examples.
    validations:
      required: true
